<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildcard Lab Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-900 rounded-[2.5rem] border border-slate-800 p-8 shadow-2xl relative overflow-hidden">
        <div class="flex flex-wrap items-center justify-between mb-8 gap-4 relative z-10">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-xl shadow-lg">
                    <i data-lucide="network" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black leading-none">Wildcard Pro</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Vainilla Engine v2</p>
                </div>
            </div>
            <div class="flex gap-6">
                <div class="text-center">
                    <p class="text-[10px] text-slate-500 uppercase font-black">Score</p>
                    <p id="score" class="text-xl font-bold text-indigo-400">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] text-slate-500 uppercase font-black">Racha</p>
                    <p id="streak" class="text-xl font-bold text-orange-500">0🔥</p>
                </div>
            </div>
        </div>

        <div class="relative z-10">
            <div class="mb-6">
                <span id="tag" class="bg-indigo-500/10 text-indigo-400 text-[10px] font-black px-3 py-1.5 rounded-xl border border-indigo-500/20 uppercase tracking-wider"></span>
            </div>

            <h2 id="description" class="text-2xl md:text-3xl font-bold mb-8 leading-tight text-white min-h-[80px]"></h2>

            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="userInput" placeholder="0.0.0.0" 
                        class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl p-6 font-mono text-2xl text-indigo-400 focus:outline-none focus:border-indigo-500 transition-all placeholder:text-slate-800 shadow-2xl">
                </div>

                <button id="actionBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 text-lg">
                    <i data-lucide="target" class="w-6 h-6"></i> Validar Configuración
                </button>

                <div id="feedbackBox" class="hidden animate-pop space-y-4">
                    <div id="feedbackTheme" class="p-6 rounded-3xl border-2">
                        <p class="font-black uppercase tracking-widest text-xs mb-2 flex items-center gap-2">
                            <i id="feedbackIcon" class="w-4 h-4"></i> Análisis Técnico
                        </p>
                        <p id="explanation" class="text-slate-300 text-sm leading-relaxed mb-4"></p>
                        <div id="correctContainer" class="bg-slate-950/50 p-4 rounded-xl border hidden">
                            <span class="text-[10px] text-slate-500 block mb-1 uppercase font-bold">Esperado:</span>
                            <code id="correctValue" class="text-red-400 font-bold text-lg"></code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = { score: 0, streak: 0, current: {}, answered: false };

        const net = {
            octet: () => Math.floor(Math.random() * 256),
            mask: (cidr) => {
                let m = [];
                for (let i = 0; i < 4; i++) {
                    let n = Math.min(cidr, 8);
                    m.push(256 - Math.pow(2, 8 - n));
                    cidr -= n;
                }
                return m.join('.');
            },
            wild: (m) => m.split('.').map(o => 255 - parseInt(o)).join('.')
        };

        function generate() {
            const types = ['conv', 'sub', 'big', 'cmd'];
            const type = types[Math.floor(Math.random() * types.length)];
            const cidr = [8, 12, 16, 20, 24, 25, 26, 27, 28, 30][Math.floor(Math.random() * 10)];
            const mask = net.mask(cidr);
            const wild = net.wild(mask);
            const ip = `${net.octet()}.${net.octet()}.${net.octet()}.0`;

            const questions = {
                conv: { tag: 'Conversión', desc: `Dada la máscara ${mask}, ¿cuál es su wildcard?`, ans: wild, exp: `Inverso binario: 255.255.255.255 - ${mask}` },
                sub: { tag: 'Subred', desc: `Escribe la wildcard para la subred ${ip}/${cidr}:`, ans: wild, exp: `Para /${cidr}, la máscara es ${mask}.` },
                big: { tag: 'Bloque', desc: `Wildcard para un bloque de /${cidr-1} (Resumen de dos /${cidr}):`, ans: net.wild(net.mask(cidr-1)), exp: 'Al resumir, se reduce el prefijo y aumenta la wildcard.' },
                cmd: { tag: 'Comando', desc: `Comando 'network' para la red ${ip} con máscara /24:`, ans: `network ${ip} 0.0.0.255`, exp: 'Sintaxis: network [Dirección] [Wildcard]' }
            };

            state.current = questions[type];
            state.answered = false;
            
            document.getElementById('tag').innerText = state.current.tag;
            document.getElementById('description').innerText = state.current.desc;
            document.getElementById('explanation').innerText = state.current.exp;
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').disabled = false;
            document.getElementById('feedbackBox').classList.add('hidden');
            document.getElementById('actionBtn').innerHTML = '<i data-lucide="target" class="w-6 h-6"></i> Validar Configuración';
            lucide.createIcons();
        }

        function validate() {
            const input = document.getElementById('userInput').value.trim().toLowerCase();
            const correct = state.current.ans.toLowerCase();
            const isCorrect = input === correct;

            state.answered = true;
            document.getElementById('userInput').disabled = true;
            document.getElementById('feedbackBox').classList.remove('hidden');
            
            if (isCorrect) {
                state.score++; state.streak++;
                setFeedback('bg-green-500/5 border-green-500/20 text-green-400', 'check-circle', false);
            } else {
                state.streak = 0;
                setFeedback('bg-red-500/5 border-red-500/20 text-red-400', 'x-circle', true);
            }

            document.getElementById('score').innerText = state.score;
            document.getElementById('streak').innerText = `${state.streak}🔥`;
            document.getElementById('actionBtn').innerHTML = '<i data-lucide="refresh-cw" class="w-6 h-6"></i> Siguiente Reto';
            lucide.createIcons();
        }

        function setFeedback(theme, icon, showCorrect) {
            document.getElementById('feedbackTheme').className = `p-6 rounded-3xl border-2 ${theme}`;
            document.getElementById('feedbackIcon').setAttribute('data-lucide', icon);
            const container = document.getElementById('correctContainer');
            if (showCorrect) {
                container.classList.remove('hidden');
                document.getElementById('correctValue').innerText = state.current.ans;
            } else {
                container.classList.add('hidden');
            }
        }

        document.getElementById('actionBtn').onclick = () => state.answered ? generate() : validate();
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') state.answered ? generate() : validate(); };

        generate();
    </script>
</body>
</html>
