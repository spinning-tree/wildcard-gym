<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildcard GYM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #020617; }
        .font-mono { font-family: 'Fira+Code', monospace; }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);

            const getRandomOctet = () => Math.floor(Math.random() * 256);
            
            const cidrToMask = (cidr) => {
                let mask = [];
                let tempCidr = cidr;
                for (let i = 0; i < 4; i++) {
                    let n = Math.min(tempCidr, 8);
                    mask.push(256 - Math.pow(2, 8 - n));
                    tempCidr -= n;
                }
                return mask.join('.');
            };

            const maskToWildcard = (mask) => {
                return mask.split('.').map(octet => 255 - parseInt(octet)).join('.');
            };

            const generateQuestion = useCallback(() => {
                const types = ['conversion', 'subnet_match', 'variable_octet', 'full_command'];
                const type = types[Math.floor(Math.random() * types.length)];
                const cidr = [8, 12, 16, 18, 20, 22, 24, 25, 26, 27, 28, 29, 30][Math.floor(Math.random() * 13)];
                const mask = cidrToMask(cidr);
                const wildcard = maskToWildcard(mask);
                const ipParts = [getRandomOctet(), getRandomOctet(), getRandomOctet(), getRandomOctet()];
                const networkIp = ipParts.map((p, i) => p & parseInt(mask.split('.')[i])).join('.');

                switch (type) {
                    case 'conversion':
                        return {
                            title: 'Máscara a Wildcard',
                            description: `Convierte la máscara ${mask} a su wildcard equivalente.`,
                            correct: wildcard,
                            explanation: `255.255.255.255 menos ${mask} es igual a ${wildcard}`
                        };
                    case 'subnet_match':
                        return {
                            title: 'Match de Red',
                            description: `Wildcard necesaria para la red ${networkIp}/${cidr}.`,
                            correct: wildcard,
                            explanation: `Para un prefijo /${cidr}, la wildcard es ${wildcard}.`
                        };
                    case 'variable_octet':
                        const octetIdx = Math.floor(Math.random() * 3);
                        const sizes = [3, 7, 15, 31];
                        const val = sizes[Math.floor(Math.random() * sizes.length)];
                        let w = [0, 0, 0, 0];
                        w[octetIdx] = val;
                        for(let i = octetIdx + 1; i < 4; i++) w[i] = 255;
                        const correctW = w.join('.');
                        return {
                            title: 'Bloque de Redes',
                            description: `Wildcard para un bloque de ${val + 1} redes en el octeto ${octetIdx + 1}.`,
                            correct: correctW,
                            explanation: `Resultado: ${correctW}. Host siempre en 255.`
                        };
                    case 'full_command':
                        return {
                            title: 'Comando network',
                            description: `Comando 'network' para ${networkIp} con máscara /${cidr}.`,
                            correct: `network ${networkIp} ${wildcard}`,
                            explanation: `Sintaxis: network [IP] [WILDCARD].`
                        };
                    default: return null;
                }
            }, []);

            useEffect(() => {
                setCurrentQuestion(generateQuestion());
            }, [generateQuestion]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!currentQuestion || feedback) return;
                const isCorrect = userInput.trim().toLowerCase() === currentQuestion.correct.toLowerCase();
                if (isCorrect) {
                    setFeedback('correct');
                    setScore(s => s + 1);
                    setStreak(s => s + 1);
                } else {
                    setFeedback('incorrect');
                    setStreak(0);
                }
            };

            const handleNext = () => {
                setFeedback(null);
                setUserInput('');
                setCurrentQuestion(generateQuestion());
            };

            if (!currentQuestion) return null;

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div className="w-full max-w-2xl">
                        {/* Header con Logo Nuevo */}
                        <div className="flex items-center justify-between mb-8 bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-xl">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                                    <span className="text-white font-black text-2xl">W</span>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-white leading-none">Wildcard GYM</h1>
                                    <p className="text-slate-500 text-[10px] uppercase font-bold mt-1">Networking</p>
                                </div>
                            </div>
                            <div className="flex gap-6">
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-500 uppercase font-black">Score</p>
                                    <p className="text-xl font-mono text-blue-400 font-bold">{score}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-500 uppercase font-black">Racha</p>
                                    <p className="text-xl font-mono text-orange-500 font-bold">{streak}</p>
                                </div>
                            </div>
                        </div>

                        {/* Card de Pregunta */}
                        <div className="bg-slate-900 rounded-[2rem] p-8 border border-slate-800 shadow-2xl">
                            <span className="bg-blue-500/10 text-blue-400 text-xs font-black px-3 py-1 rounded-lg border border-blue-500/20 uppercase mb-4 inline-block">
                                {currentQuestion.title}
                            </span>
                            <h2 className="text-2xl font-bold mb-8 text-white">{currentQuestion.description}</h2>

                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={userInput}
                                        onChange={(e) => setUserInput(e.target.value)}
                                        disabled={!!feedback}
                                        placeholder="Respuesta..."
                                        className="w-full bg-slate-950 border-2 border-slate-800 rounded-xl p-5 font-mono text-xl text-blue-400 focus:outline-none focus:border-blue-500 transition-all"
                                        autoFocus
                                    />
                                </div>

                                {!feedback ? (
                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all active:scale-95">
                                        COMPROBAR
                                    </button>
                                ) : (
                                    <div className="space-y-4">
                                        <div className={`p-4 rounded-xl border-2 ${feedback === 'correct' ? 'bg-green-500/5 border-green-500/20 text-green-400' : 'bg-red-500/5 border-red-500/20 text-red-400'}`}>
                                            <p className="text-sm mb-1 font-bold uppercase tracking-tight">
                                                {feedback === 'correct' ? 'CORRECTO' : 'INCORRECTO'}
                                            </p>
                                            <p className="text-slate-300 text-sm mb-3">{currentQuestion.explanation}</p>
                                            {feedback === 'incorrect' && (
                                                <div className="bg-slate-950 p-3 rounded-lg border border-red-900/20 font-mono text-center text-lg">
                                                    {currentQuestion.correct}
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={handleNext} type="button" className="w-full bg-white text-slate-950 font-black py-4 rounded-xl hover:bg-slate-200 transition-all">
                                            SIGUIENTE
                                        </button>
                                    </div>
                                )}
                            </form>
                        </div>

                        <p className="mt-10 text-center text-slate-700 text-[10px] uppercase tracking-widest font-black">
                            SPINNING-TREE NETWORKS
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
