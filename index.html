<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildcard GYM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Mock de iconos para evitar errores de importación en navegador
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [userInput, setUserInput] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);

            const getRandomOctet = () => Math.floor(Math.random() * 256);
            const cidrToMask = (cidr) => {
                let mask = [];
                for (let i = 0; i < 4; i++) {
                    let n = Math.min(cidr, 8);
                    mask.push(256 - Math.pow(2, 8 - n));
                    cidr -= n;
                }
                return mask.join('.');
            };
            const maskToWildcard = (mask) => mask.split('.').map(octet => 255 - parseInt(octet)).join('.');

            const generateQuestion = useCallback(() => {
                const types = ['conversion', 'subnet_match', 'variable_octet', 'full_command'];
                const type = types[Math.floor(Math.random() * types.length)];
                const cidrs = [8, 12, 16, 20, 24, 26, 28, 30];
                const cidr = cidrs[Math.floor(Math.random() * cidrs.length)];
                const mask = cidrToMask(cidr);
                const wildcard = maskToWildcard(mask);
                const ip = `${getRandomOctet()}.${getRandomOctet()}.${getRandomOctet()}.0`;

                switch (type) {
                    case 'conversion':
                        return { title: 'Conversión', description: `Máscara: ${mask}. ¿Wildcard?`, correct: wildcard, explanation: `255.255.255.255 - ${mask}` };
                    case 'subnet_match':
                        return { title: 'Subred', description: `Habilita la red ${ip}/${cidr}. Solo wildcard:`, correct: wildcard, explanation: `Cero en bits de red, uno en bits de host.` };
                    case 'variable_octet':
                        return { title: 'Host', description: `Activa solo la IP ${ip.replace('.0', '.5')}. ¿Wildcard?`, correct: '0.0.0.0', explanation: `Match exacto = 0.0.0.0` };
                    default:
                        return { title: 'Comando', description: `Comando completo para ${ip} /24:`, correct: `network ${ip} 0.0.0.255`, explanation: `network [IP] [Wildcard]` };
                }
            }, []);

            useEffect(() => { setCurrentQuestion(generateQuestion()); }, [generateQuestion]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (userInput.trim().toLowerCase() === currentQuestion.correct.toLowerCase()) {
                    setFeedback('correct'); setScore(s => s + 1); setStreak(s => s + 1);
                } else {
                    setFeedback('incorrect'); setStreak(0);
                }
            };

            if (!currentQuestion) return null;

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 w-full max-w-lg shadow-2xl">
                        <div className="flex justify-between mb-6">
                            <span className="text-indigo-400 font-bold uppercase text-xs tracking-widest">{currentQuestion.title}</span>
                            <span className="text-slate-500 font-mono text-xs">Puntos: {score} | Racha: {streak}🔥</span>
                        </div>
                        <h2 className="text-white text-2xl font-bold mb-6">{currentQuestion.description}</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input 
                                type="text" 
                                value={userInput}
                                onChange={(e) => setUserInput(e.target.value)}
                                disabled={feedback !== null}
                                className="w-full bg-slate-950 border-2 border-slate-800 rounded-xl p-4 font-mono text-indigo-400 focus:outline-none focus:border-indigo-500"
                                placeholder="0.0.0.0"
                            />
                            {!feedback ? (
                                <button className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-500 transition-all">Validar</button>
                            ) : (
                                <div className="space-y-4">
                                    <div className={`p-4 rounded-xl border ${feedback === 'correct' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-red-500/10 border-red-500/20 text-red-400'}`}>
                                        <p className="text-sm">{currentQuestion.explanation}</p>
                                        {feedback === 'incorrect' && <p className="font-bold mt-2 text-xs uppercase">Correcta: {currentQuestion.correct}</p>}
                                    </div>
                                    <button onClick={() => { setFeedback(null); setUserInput(''); setCurrentQuestion(generateQuestion()); }} className="w-full bg-white text-black font-bold py-4 rounded-xl">Siguiente</button>
                                </div>
                            )}
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
